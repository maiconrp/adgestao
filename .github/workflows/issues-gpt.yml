name: Responder Issue com ChatGPT

on:
  issues:
    types: [opened]

jobs:
  responder-issue:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Responder Issue com ChatGPT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        # Define as informações da issue
        issue_number=$(jq --raw-output .issue.number "$GITHUB_EVENT_PATH")
        issue_body=$(jq --raw-output .issue.body "$GITHUB_EVENT_PATH")
        issue_comments_url=$(jq --raw-output .issue.comments_url "$GITHUB_EVENT_PATH")
        
        # Instancia o modelo do ChatGPT
        prompt="Problema: ${issue_body}\nSolução possível:"
        solution=$(curl https://api.openai.com/v1/engines/davinci-codex/completions \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${OPENAI_API_KEY}" \
          -d "{\"prompt\": \"${prompt}\", \"max_tokens\": 1024, \"n\": 1, \"stop\": null, \"temperature\": 0.5}" \
          | jq --raw-output '.choices[].text' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
        
        # Cria a mensagem com a solução e posta como um comentário na issue
        message="Solução possível para a issue #${issue_number}:\n\n${solution}"
        curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" -X POST -d "{\"body\": \"${message}\"}" "${issue_comments_url}" > /dev/null
