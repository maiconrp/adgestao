name: Pylint

on:
  push:
    branches: [ test/actions ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8"]
    
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Use Node.js 14
      uses: actions/setup-node@v3
      with:
        node-version: 14
        
    - name: Set up Git
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "Action Pylint"
        
    - name: Upgrade setuptools
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools
    
    - name: Install dependencies
      run: |
        python -m pip install pylint
    
    - name: Analyze the code with pylint
      run: |
        pylint $(git ls-files '*.py') > pylint_report.txt || true
    
    - name: Generate Markdown report
      run: |
        awk -F ":" '
          BEGIN {
            count = 0
            print "# Pylint Report"
            # A seguir, a correção necessária para que o relatório mostre o número total de erros
            printf "\n**Total**: %d\n", NR
            print "| Arquivo | Linha | Erro | Código do erro | Tipo |"
            print "| ------- | ------|------| ---- ----------| ---- |"
          }
          # Este bloco de código é executado para cada erro encontrado pelo Pylint
          /^([^:]+):([0-9]+):([0-9]+): ([A-Z0-9]+): (.+)\(([^)]+)\)$/ {
            
            arquivo = $1
            sub(/^.*\//, "", arquivo)
            caminho = "["arquivo"]("$1")"
            
            linha = $2
            
            codigo_erro = $4
            
            erro = $5
            gsub(/ +\(.+\)/, "", erro)
            
            tipo_erro = $6
            gsub(/[\(\)]/, "", tipo_erro)) ? tipo_erro : "N/A"
            
            # A seguir, uma correção necessária para que o relatório mostre a linha e a coluna em que o erro ocorreu
            print "| " caminho " | | "linha" | " erro " | " codigo_erro " | " tipo_erro " |"
          }
        ' pylint_report.txt > PYREPORT.md


    - name: Check for changes
      run: |
        if [ -z "$(git status --porcelain)" ]; then
          echo "No changes detected"
          exit 0
        fi
    - name: Commit changes
      run: |
        git add . && git commit -m ":wrench: chore: Add pylint issues"
        git push
