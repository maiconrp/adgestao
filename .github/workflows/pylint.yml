name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py')
      timeout-minutes: 10
     
    - name: Create issues for pylint errors
      run: |
        pylint --output-format=parseable $(git ls-files '*.py') |
          awk -F ":" '{print $1 ":" $2 ":" $4}' |
          sed 's/^/pylint\//' |
          sed 's/:/\/erro - /' |
          sed 's/:/:\n/' |
          sed 's/^\([^:]*\):\([^:]*\):\([^:]*\):\s*\[\(.*\)\]/::error file=\1,line=\2,col=\3::[\4]/' |
          awk '{print "::set-output name=issue_title::" $0}' |
          awk '{print "::set-output name=issue_body::Code has a pylint issue.\n\n" $0}' |
          sed 's/\/erro/\/error/g' |
          sed 's/\\//g' |
          awk '{print "::error " $0 " ::"}' |
          tee /dev/stderr |
          tee /dev/stdout
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: ${{ steps.analyse_code_with_pylint.outcome == 'success' && steps.analyse_code_with_pylint.outputs.total_reports > 0 }}

