name: Pylint

on:
  push:
    branches: [test/actions]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8"]
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Use Node.js 14
        uses: actions/setup-node@v3
        with:
          node-version: 16
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      - name: Upgrade setuptools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
      - name: Install dependencies
        run: |
          python -m pip install pylint
      - name: Analyze the code with pylint
        run: |
          pylint $(git ls-files '*.py') > pylint_report.txt
      - name: Generate Markdown report
        run: |
          echo "|Line|Column|Message|\n|---|---|---|" > pylint_report.md
          cat pylint_report.txt | grep -E '^[^:]+:[0-9]+:' | sed 's/:/|/; s/:/|/; s/^/|/; s/$/|/' >> pylint_report.md
          git diff --quiet || git commit -am "🔧 wrench: Add pylint issues" && git push
