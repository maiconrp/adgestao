name: Pylint

on:
  push:
    branches: [ test/actions ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8"]
    
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Use Node.js 14
      uses: actions/setup-node@v3
      with:
        node-version: 14
        
    - name: Set up Git
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "Action Pylint"
        
    - name: Upgrade setuptools
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools
    
    - name: Install dependencies
      run: |
        python -m pip install pylint
    
    - name: Analyze the code with pylint
      run: |
        pylint $(git ls-files '*.py') > pylint_report.txt || true
    
    - name: Generate Markdown report
      run: |
        awk -F ":" '
          BEGIN {
            print "# Pylint Report"
            print "**Total**: " count
            print ""
            print "| Arquivo | Código do erro | Erro | Tipo | Local |"
            print "| ------- | ------------- | ---- | ---- | ----- |"
          }
          /^([^:]+):([0-9]+):([0-9]+): ([A-Z0-9]+): (.+)\((.*)\)$/ {
            file = $2
            gsub(/^ +| +$/, "", file)
            error_code = $4
            error = $5
            gsub(/ +\(.+\)/, "", error)
            error_type = $6
            gsub(/[\(\)]/, "", error_type)
            location = "["file":"$3"]("$1":"$3")"
            print "| " file " | " error_code " | " error " | " error_type " | " location " |"
            count++
          }
          END {
            printf "\n**Total**: %d\n", count
          }
        ' pylint_report.txt > pylint_report.md



    - name: Check for changes
      run: |
        if [ -z "$(git status --porcelain)" ]; then
          echo "No changes detected"
          exit 0
        fi
    - name: Commit changes
      run: |
        git add . && git commit -m ":wrench: chore: Add pylint issues"
        git push
